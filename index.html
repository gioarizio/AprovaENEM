<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AprovaIA</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <h1>📚 AprovaIA</h1>
    <p>Questões Inteligentes Adaptativas</p>
</header>

<div class="container">

    <div class="stats">

        <div class="stat-box">
            <h3>✅ Acertos</h3>
            <p id="hits">0</p>
        </div>

        <div class="stat-box">
            <h3>❌ Erros</h3>
            <p id="mistakes">0</p>
        </div>

        <div class="stat-box">
            <h3>🎯 Dificuldade</h3>
            <p id="difficultyText">Fácil</p>
        </div>

    </div>

    <div class="card">

        <div class="top-bar">

            <h2>🧠 Questão Adaptativa</h2>

            <div class="level easy-level" id="level">
                Nível Fácil
            </div>

        </div>

        <br>

        <label><strong>Escolha o nível:</strong></label>

        <select class="select-level" onchange="changeDifficulty(this.value)">
            <option value="easy">🟢 Fácil</option>
            <option value="medium">🟠 Médio</option>
            <option value="hard">🔴 Difícil</option>
        </select>

        <div class="question" id="question"></div>

        <div id="options"></div>

        <p id="feedback"></p>

        <div class="progress-area">

            <div class="progress-title">
                📈 Progresso
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

        </div>

        <div class="buttons">

            <button onclick="nextQuestion()">
                Próxima Questão
            </button>

            <button onclick="resetGame()">
                Reiniciar
            </button>

        </div>

    </div>

</div>

<footer>
    Desenvolvido com ❤️ para estudos inteligentes
</footer>

<script src="script.js"></script>

</body>
</html>
